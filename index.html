<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prode Oficina 2026 - Edición Celeste y Blanca</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para traducir JSX en vivo -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-sky-50 text-slate-800 antialiased selection:bg-sky-300 selection:text-sky-900">
    
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // CONFIGURACIÓN DE FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD-gYlH2Nzmv-26UI8QHEVNPU5fHjoVAZw",
            authDomain: "prode2026-5082b.firebaseapp.com",
            projectId: "prode2026-5082b",
            storageBucket: "prode2026-5082b.firebasestorage.app",
            messagingSenderId: "642143421766",
            appId: "1:642143421766:web:28672abc1fe76d94759147"
        };

        const PRODE_APP_ID = 'prode-oficina-app';

        // Inicializamos Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- ICONOS ---
        const Trophy = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7c0 3.31 2.69 6 6 6s6-2.69 6-6V2Z"/></svg>;
        const Calendar = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const Info = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const CheckCircle2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const AlertCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
        const Play = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const ChevronRight = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const Cloud = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>;
        const Globe = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;
        const Sun = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;

        const { useState, useEffect, useRef, useMemo } = React;

        // --- PARTIDOS (Ejemplo con el nuevo formato de fases) ---
        // Se puede expandir luego con los 104 partidos oficiales.
        const initialMatches = [
            // GRUPOS (Ejemplo Grupo A y J)
            { id: 1, stage: 'grupos', home: 'México', homeFlag: '🇲🇽', away: 'Sudáfrica', awayFlag: '🇿🇦', date: '11 Jun 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
            { id: 2, stage: 'grupos', home: 'Rep. de Corea', homeFlag: '🇰🇷', away: 'Chequia', awayFlag: '🇨🇿', date: '12 Jun 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
            { id: 3, stage: 'grupos', home: 'Argentina', homeFlag: '🇦🇷', away: 'Argelia', awayFlag: '🇩🇿', date: '13 Jun 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
            { id: 4, stage: 'grupos', home: 'Brasil', homeFlag: '🇧🇷', away: 'Marruecos', awayFlag: '🇲🇦', date: '14 Jun 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
            { id: 5, stage: 'grupos', home: 'España', homeFlag: '🇪🇸', away: 'Cabo Verde', awayFlag: '🇨🇻', date: '15 Jun 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
            
            // 16AVOS DE FINAL (Ronda de 32)
            { id: 101, stage: '16avos', home: '1A', homeFlag: '❓', away: '3C/D/E', awayFlag: '❓', date: '28 Jun 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
            { id: 102, stage: '16avos', home: '2B', homeFlag: '❓', away: '2F', awayFlag: '❓', date: '29 Jun 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
            
            // OCTAVOS DE FINAL
            { id: 201, stage: 'octavos', home: 'Ganador 101', homeFlag: '❓', away: 'Ganador 102', awayFlag: '❓', date: '4 Jul 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
            
            // CUARTOS DE FINAL
            { id: 301, stage: 'cuartos', home: 'Ganador 201', homeFlag: '❓', away: 'Ganador 202', awayFlag: '❓', date: '9 Jul 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
            
            // SEMIFINALES
            { id: 401, stage: 'semis', home: 'Ganador 301', homeFlag: '❓', away: 'Ganador 302', awayFlag: '❓', date: '14 Jul 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
            
            // TERCER PUESTO
            { id: 501, stage: '3er_puesto', home: 'Perdedor 401', homeFlag: '❓', away: 'Perdedor 402', awayFlag: '❓', date: '18 Jul 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
            
            // FINAL
            { id: 601, stage: 'final', home: 'Ganador 401', homeFlag: '❓', away: 'Ganador 402', awayFlag: '❓', date: '19 Jul 2026', status: 'pending', realHomeScore: null, realAwayScore: null },
        ];

        const stagesList = [
            { id: 'grupos', label: 'Grupos' },
            { id: '16avos', label: '16avos' },
            { id: 'octavos', label: 'Octavos' },
            { id: 'cuartos', label: 'Cuartos' },
            { id: 'semis', label: 'Semis' },
            { id: '3er_puesto', label: '3er Puesto' },
            { id: 'final', label: 'Final' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [userName, setUserName] = useState('');
            const [isLogged, setIsLogged] = useState(false);
            const [activeTab, setActiveTab] = useState('inicio');
            const [activeStage, setActiveStage] = useState('grupos'); // Para el sub-menú
            
            const [matches, setMatches] = useState(initialMatches);
            const [predictions, setPredictions] = useState({});
            const [allPredictions, setAllPredictions] = useState([]);
            const [leaderboard, setLeaderboard] = useState([]);
            const [toast, setToast] = useState(null);

            const hasLoadedPreds = useRef(false);

            // 1. Autenticación
            useEffect(() => {
                auth.signInAnonymously().catch(error => console.error("Error Auth:", error));
                const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
                return () => unsubscribe();
            }, []);

            // 2. Sincronización DB
            useEffect(() => {
                if (!user) return;

                const predsRef = db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('predictions');
                const unsubPreds = predsRef.onSnapshot(snap => {
                    const all = [];
                    snap.forEach(doc => all.push({ id: doc.id, ...doc.data() }));
                    setAllPredictions(all);
                });

                const globalRef = db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('state').doc('global');
                const unsubGlobal = globalRef.onSnapshot(doc => {
                    if (doc.exists && doc.data().matches) {
                        setMatches(doc.data().matches);
                    }
                });

                return () => { unsubPreds(); unsubGlobal(); };
            }, [user]);

            // 3. Cargar mis datos
            useEffect(() => {
                if (isLogged && user && allPredictions.length > 0 && !hasLoadedPreds.current) {
                    const myData = allPredictions.find(p => p.id === user.uid);
                    if (myData && myData.preds) setPredictions(myData.preds);
                    hasLoadedPreds.current = true;
                }
            }, [isLogged, user, allPredictions]);

            // 4. Calcular el Ranking
            useEffect(() => {
                const newBoard = allPredictions
                .filter(p => p.userName)
                .map(p => {
                    let pts = 0; let perfs = 0;
                    matches.forEach(m => {
                        if (m.status === 'finished' && p.preds && p.preds[m.id]) {
                            const res = calculatePoints(p.preds[m.id].home, p.preds[m.id].away, m.realHomeScore, m.realAwayScore);
                            pts += res.pts;
                            if (res.perfect) perfs += 1;
                        }
                    });
                    return { id: p.id, name: p.userName, points: pts, perfects: perfs, isMe: p.id === user?.uid };
                })
                .sort((a, b) => b.points - a.points || b.perfects - a.perfects);
                setLeaderboard(newBoard);
            }, [allPredictions, matches, user]);

            const calculatePoints = (predHome, predAway, realHome, realAway) => {
                if (predHome === undefined || predAway === undefined || predHome === '' || predAway === '') return { pts: 0, perfect: false };
                const pH = parseInt(predHome), pA = parseInt(predAway), rH = parseInt(realHome), rA = parseInt(realAway);
                if (pH === rH && pA === rA) return { pts: 3, perfect: true };
                const pDiff = pH - pA, rDiff = rH - rA;
                if ((pDiff > 0 && rDiff > 0) || (pDiff < 0 && rDiff < 0) || (pDiff === 0 && rDiff === 0)) return { pts: 1, perfect: false };
                return { pts: 0, perfect: false };
            };

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            const handleLogin = (e) => {
                e.preventDefault();
                if (userName.trim().length > 2) {
                    setIsLogged(true);
                    if (user) {
                        db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('predictions').doc(user.uid).set({ userName }, { merge: true });
                    }
                }
            };

            const savePredictions = () => {
                const total = Object.keys(predictions).filter(id => predictions[id]?.home !== '' && predictions[id]?.away !== '').length;
                if (total === 0) { showToast('⚠️ No completaste ningún resultado.'); return; }
                if (user) {
                    db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('predictions').doc(user.uid).set({ userName, preds: predictions, updatedAt: Date.now() }, { merge: true });
                    showToast('✅ ¡Pronósticos guardados en la nube!');
                }
            };

            const simulateResults = () => {
                const finishedMatches = matches.map(m => ({
                    ...m, status: 'finished', realHomeScore: Math.floor(Math.random() * 4), realAwayScore: Math.floor(Math.random() * 4)
                }));
                if (user) {
                    db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('state').doc('global').set({ matches: finishedMatches }, { merge: true });
                    showToast('⚽ ¡Resultados actualizados para todos!');
                }
            };

            // Calcular posiciones reales del torneo (Solo suma Fase de Grupos)
            const tournamentStandings = useMemo(() => {
                const standings = {};
                matches.forEach(m => {
                    // Solo calculamos standings para equipos con nombre real en fase de grupos
                    if (m.stage !== 'grupos' || m.home.includes('Ganador') || m.home.includes('1A')) return;

                    if (!standings[m.home]) standings[m.home] = { name: m.home, flag: m.homeFlag, pts: 0, pj: 0, gf: 0, gc: 0 };
                    if (!standings[m.away]) standings[m.away] = { name: m.away, flag: m.awayFlag, pts: 0, pj: 0, gf: 0, gc: 0 };
                    
                    if (m.status === 'finished') {
                        const h = parseInt(m.realHomeScore), a = parseInt(m.realAwayScore);
                        standings[m.home].pj++; standings[m.away].pj++;
                        standings[m.home].gf += h; standings[m.home].gc += a;
                        standings[m.away].gf += a; standings[m.away].gc += h;
                        if (h > a) standings[m.home].pts += 3;
                        else if (h < a) standings[m.away].pts += 3;
                        else { standings[m.home].pts++; standings[m.away].pts++; }
                    }
                });
                return Object.values(standings).sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    const diffA = a.gf - a.gc, diffB = b.gf - b.gc;
                    if (diffB !== diffA) return diffB - diffA;
                    return b.gf - a.gf;
                });
            }, [matches]);

            const isSimulated = matches.some(m => m.status === 'finished');
            const matchesToShow = matches.filter(m => m.stage === activeStage);

            // Pantalla de Login (Celeste y Blanco)
            if (!isLogged) {
                return (
                    <div className="min-h-screen bg-sky-600 flex flex-col items-center justify-center p-4 font-sans">
                        <div className="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl text-center relative overflow-hidden border-4 border-sky-200">
                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-sky-300 via-white to-sky-300"></div>
                            
                            <div className="bg-sky-100 p-4 rounded-full inline-block mb-4 border border-sky-200 shadow-inner">
                                <Sun className="w-12 h-12 text-sky-500" />
                            </div>
                            
                            <h1 className="text-3xl font-extrabold text-sky-900 mb-2">Prode Oficina</h1>
                            <p className="text-sky-600 font-medium mb-8">Mundial 2026 🇦🇷 Vamos Selección</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <input
                                        type="text"
                                        placeholder="Tu nombre (ej: Nacho - Diseño)"
                                        value={userName}
                                        onChange={(e) => setUserName(e.target.value)}
                                        className="w-full bg-sky-50 border-2 border-sky-200 rounded-xl px-4 py-4 text-sky-900 focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-200 text-center text-lg font-medium placeholder-sky-400"
                                        autoFocus
                                    />
                                </div>
                                <button
                                    type="submit"
                                    disabled={userName.trim().length < 3 || !user}
                                    className="w-full bg-sky-500 hover:bg-sky-600 disabled:opacity-50 text-white font-bold text-lg py-4 rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2"
                                >
                                    {user ? <React.Fragment>Entrar a la Cancha <ChevronRight className="w-5 h-5" /></React.Fragment> : 'Conectando...'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="pb-32 bg-sky-50 min-h-screen">
                    {/* Header Principal */}
                    <header className="bg-sky-600 shadow-md sticky top-0 z-20">
                        <div className="max-w-2xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <Sun className="w-7 h-7 text-yellow-300" />
                                <h1 className="text-xl font-black text-white tracking-wide">Prode 2026</h1>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="flex items-center gap-1 text-[10px] text-sky-200 font-bold uppercase tracking-wider"><Cloud className="w-4 h-4" /></span>
                                <div className="bg-white/10 px-3 py-1.5 rounded-full text-sm font-bold text-white border border-sky-400 shadow-sm">
                                    {userName}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 py-6">
                        {toast && (
                            <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-sky-800 text-white px-6 py-3 rounded-full shadow-xl flex items-center gap-2 z-50 animate-bounce border border-sky-600">
                                <CheckCircle2 className="w-5 h-5 text-sky-300" />
                                <span className="font-bold text-sm whitespace-nowrap">{toast}</span>
                            </div>
                        )}

                        {/* Pestaña: Mundial (Posiciones Reales) */}
                        {activeTab === 'inicio' && (
                            <div className="space-y-6">
                                <div>
                                    <h2 className="text-2xl font-black text-sky-900 mb-1">Mundial 2026</h2>
                                    <p className="text-sky-600 font-medium text-sm mb-6">Fase de Grupos - Rendimiento Real.</p>
                                </div>
                                <div className="bg-white rounded-2xl border border-sky-200 shadow-sm overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-sky-100/50 border-b border-sky-200 text-[10px] text-sky-700 uppercase font-bold">
                                                <th className="p-3 w-8 text-center">#</th>
                                                <th className="p-3">Equipo</th>
                                                <th className="p-3 text-center">PJ</th>
                                                <th className="p-3 text-center">DIF</th>
                                                <th className="p-3 text-right text-sky-900">PTS</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-sky-100">
                                            {tournamentStandings.map((team, i) => (
                                                <tr key={team.name} className="hover:bg-sky-50 transition-colors">
                                                    <td className="p-3 text-center text-sky-500 font-bold text-sm">{i + 1}</td>
                                                    <td className="p-3 font-bold text-slate-700 flex items-center gap-2 text-sm"><span className="text-xl">{team.flag}</span> {team.name}</td>
                                                    <td className="p-3 text-center text-slate-500 text-sm">{team.pj}</td>
                                                    <td className="p-3 text-center text-slate-500 text-sm font-medium">{team.gf - team.gc > 0 ? `+${team.gf - team.gc}` : team.gf - team.gc}</td>
                                                    <td className="p-3 text-right font-black text-sky-700 text-base">{team.pts}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* Pestaña: Pronósticos */}
                        {activeTab === 'pronosticos' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-end mb-2">
                                    <div>
                                        <h2 className="text-2xl font-black text-sky-900">Pronósticos</h2>
                                        <p className="text-sky-600 font-medium text-sm">Cargá tus resultados por fase.</p>
                                    </div>
                                    {!isSimulated && <button onClick={simulateResults} className="text-xs bg-white hover:bg-sky-50 border border-sky-300 text-sky-700 font-bold px-3 py-2 rounded-lg flex items-center gap-1 shadow-sm"><Play className="w-3 h-3 text-sky-500" /> Simular</button>}
                                </div>

                                {/* Submenú de Fases */}
                                <div className="flex overflow-x-auto pb-2 gap-2 hide-scrollbar">
                                    {stagesList.map(stage => (
                                        <button 
                                            key={stage.id} 
                                            onClick={() => setActiveStage(stage.id)}
                                            className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm ${activeStage === stage.id ? 'bg-sky-600 text-white shadow-md' : 'bg-white text-sky-700 border border-sky-200 hover:bg-sky-50'}`}
                                        >
                                            {stage.label}
                                        </button>
                                    ))}
                                </div>

                                <div className="space-y-4">
                                    {matchesToShow.map(match => {
                                        const pred = predictions[match.id] || { home: '', away: '' };
                                        const isFinished = match.status === 'finished';
                                        
                                        let resultBadge = null;
                                        if (isFinished && pred.home !== '' && pred.away !== '') {
                                            const result = calculatePoints(pred.home, pred.away, match.realHomeScore, match.realAwayScore);
                                            if (result.perfect) resultBadge = <span className="text-[10px] font-black text-white bg-green-500 px-2 py-0.5 rounded-md shadow-sm ml-2">PLENO +3</span>;
                                            else if (result.pts === 1) resultBadge = <span className="text-[10px] font-black text-white bg-blue-500 px-2 py-0.5 rounded-md shadow-sm ml-2">ACIERTO +1</span>;
                                            else resultBadge = <span className="text-[10px] font-black text-white bg-red-400 px-2 py-0.5 rounded-md shadow-sm ml-2">NADA 0</span>;
                                        }

                                        return (
                                            <div key={match.id} className="bg-white rounded-2xl p-4 border border-sky-200 shadow-sm relative">
                                                <div className="flex justify-between items-center text-xs font-bold text-sky-600 mb-4 uppercase tracking-wider">
                                                    <span>{match.date}</span>
                                                    {isFinished ? <span className="text-slate-500 flex items-center">FINAL {resultBadge}</span> : <span className="text-yellow-600">PENDIENTE</span>}
                                                </div>
                                                
                                                <div className="flex justify-between items-center gap-2">
                                                    <div className="flex flex-col items-center flex-1 w-1/3 text-center">
                                                        <span className="text-4xl mb-2 drop-shadow-sm">{match.homeFlag}</span>
                                                        <span className="font-bold text-slate-700 text-sm">{match.home}</span>
                                                    </div>
                                                    
                                                    <div className="flex items-center gap-2">
                                                        <input type="number" min="0" value={pred.home} onChange={(e) => setPredictions(p => ({...p, [match.id]: {...p[match.id], home: e.target.value}}))} disabled={isFinished} className="w-12 h-14 bg-sky-50 border-2 border-sky-200 rounded-xl text-center text-xl font-black text-sky-900 focus:border-sky-500 focus:ring-2 focus:ring-sky-200 disabled:opacity-50 disabled:bg-slate-100 shadow-inner" />
                                                        <span className="text-sky-300 font-black">-</span>
                                                        <input type="number" min="0" value={pred.away} onChange={(e) => setPredictions(p => ({...p, [match.id]: {...p[match.id], away: e.target.value}}))} disabled={isFinished} className="w-12 h-14 bg-sky-50 border-2 border-sky-200 rounded-xl text-center text-xl font-black text-sky-900 focus:border-sky-500 focus:ring-2 focus:ring-sky-200 disabled:opacity-50 disabled:bg-slate-100 shadow-inner" />
                                                    </div>
                                                    
                                                    <div className="flex flex-col items-center flex-1 w-1/3 text-center">
                                                        <span className="text-4xl mb-2 drop-shadow-sm">{match.awayFlag}</span>
                                                        <span className="font-bold text-slate-700 text-sm">{match.away}</span>
                                                    </div>
                                                </div>
                                                
                                                {isFinished && <div className="mt-4 pt-3 border-t border-sky-100 text-center text-sm font-medium text-slate-500">Resultado Oficial: <span className="font-black text-sky-700">{match.realHomeScore} - {match.realAwayScore}</span></div>}
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={savePredictions} className="w-full bg-sky-500 hover:bg-sky-600 text-white font-black py-4 rounded-xl flex justify-center items-center gap-2 shadow-md hover:shadow-lg transition-all sticky bottom-24"><Cloud className="w-5 h-5" /> Guardar Pronósticos</button>
                            </div>
                        )}

                        {/* Pestaña: Ranking */}
                        {activeTab === 'ranking' && (
                            <div className="space-y-4">
                                <div><h2 className="text-2xl font-black text-sky-900 mb-1">Tabla de la Oficina</h2></div>
                                <div className="bg-white rounded-2xl border border-sky-200 shadow-sm overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-sky-100/50 border-b border-sky-200 text-xs text-sky-700 uppercase font-bold">
                                                <th className="p-4 text-center">#</th>
                                                <th className="p-4">Jugador</th>
                                                <th className="p-4 text-right text-sky-900">Pts</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-sky-100">
                                            {leaderboard.length === 0 ? <tr><td colSpan="3" className="p-8 text-center text-slate-500 font-medium">Aún no hay participantes.<br/>¡Cargá los tuyos!</td></tr> :
                                                leaderboard.map((u, i) => (
                                                    <tr key={u.id} className={`hover:bg-sky-50 transition-colors ${u.isMe ? 'bg-sky-100/50 border-l-4 border-l-sky-500' : ''}`}>
                                                        <td className="p-4 text-center font-bold text-slate-500">
                                                            {i === 0 ? '🏆' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}
                                                        </td>
                                                        <td className="p-4 font-bold text-slate-700">
                                                            {u.name} {u.isMe && <span className="text-[10px] font-black bg-sky-500 text-white px-2 py-0.5 rounded-full ml-2 shadow-sm">VOS</span>}
                                                        </td>
                                                        <td className="p-4 text-right font-black text-sky-600 text-lg">{u.points}</td>
                                                    </tr>
                                                ))
                                            }
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* Pestaña: Reglas */}
                        {activeTab === 'reglas' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-black text-sky-900 mb-4">Reglas del Prode</h2>
                                <div className="bg-white border-2 border-green-200 p-5 rounded-2xl shadow-sm relative overflow-hidden">
                                    <div className="absolute top-0 right-0 bg-green-500 text-white font-black px-3 py-1 rounded-bl-lg text-xs">3 PUNTOS</div>
                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><CheckCircle2 className="w-5 h-5 text-green-500"/> El Pleno</h3>
                                    <p className="text-slate-600 font-medium text-sm mt-2">Acertás el resultado exacto (ej: ponés 2-0 y sale 2-0).</p>
                                </div>
                                <div className="bg-white border-2 border-blue-200 p-5 rounded-2xl shadow-sm relative overflow-hidden">
                                    <div className="absolute top-0 right-0 bg-blue-500 text-white font-black px-3 py-1 rounded-bl-lg text-xs">1 PUNTO</div>
                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><AlertCircle className="w-5 h-5 text-blue-500"/> El Acierto</h3>
                                    <p className="text-slate-600 font-medium text-sm mt-2">Acertás al ganador o si hay empate (ej: ponés 1-0 y sale 3-0).</p>
                                </div>
                                <div className="bg-sky-100 border border-sky-200 p-5 rounded-2xl shadow-sm">
                                    <h3 className="font-bold text-sky-900 mb-2 text-sm uppercase">Detalles del Formato (48 equipos)</h3>
                                    <ul className="text-sky-800 text-sm space-y-2 list-disc list-inside font-medium">
                                        <li>Los puntos en eliminatorias (16avos en adelante) se cuentan por el resultado de los 90 minutos reglamentarios.</li>
                                        <li>El botón de "Guardar" guarda los cambios de <b>todas las fases juntas</b>.</li>
                                    </ul>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navbar Inferior */}
                    <nav className="fixed bottom-0 w-full bg-white border-t border-sky-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe">
                        <div className="max-w-2xl mx-auto flex justify-around p-2">
                            {[{id:'inicio', icon: Globe, label: 'Mundial'}, {id:'pronosticos', icon: Calendar, label: 'Partidos'}, {id:'ranking', icon: Trophy, label: 'Ranking'}, {id:'reglas', icon: Info, label: 'Reglas'}].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1 p-3 rounded-xl w-1/4 transition-colors ${activeTab === tab.id ? 'text-sky-600 bg-sky-50' : 'text-slate-400 hover:text-sky-500'}`}>
                                    <tab.icon className="w-6 h-6" /><span className="text-[10px] font-black uppercase tracking-wider">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <style>
        /* Ocultar barra de scroll en el submenú horizontal */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
