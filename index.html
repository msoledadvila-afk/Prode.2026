<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prode Oficina 2026</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para traducir JSX en vivo -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase (Versión Compat para HTML simple) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 antialiased selection:bg-lime-500 selection:text-slate-950">
    
    <!-- Acá es donde React va a inyectar toda la app -->
    <div id="root"></div>

    <!-- EL SCRIPT DE LA APP -->
    <script type="text/babel">

        // ==========================================
        // CONFIGURACIÓN DE FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD-gYlH2Nzmv-26UI8QHEVNPU5fHjoVAZw",
            authDomain: "prode2026-5082b.firebaseapp.com",
            projectId: "prode2026-5082b",
            storageBucket: "prode2026-5082b.firebasestorage.app",
            messagingSenderId: "642143421766",
            appId: "1:642143421766:web:28672abc1fe76d94759147"
        };

        const PRODE_APP_ID = 'prode-oficina-app';

        // Inicializamos Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- ICONOS (Para HTML puro) ---
        const Trophy = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7c0 3.31 2.69 6 6 6s6-2.69 6-6V2Z"/></svg>;
        const Calendar = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const Info = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const CheckCircle2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const AlertCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
        const Play = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const ChevronRight = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const Cloud = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>;
        const Globe = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;

        const { useState, useEffect, useRef, useMemo } = React;

        const initialMatches = [
            { id: 1, home: 'México', homeFlag: '🇲🇽', away: 'Alemania', awayFlag: '🇩🇪', date: '11 Jun 2026 - 15:00', status: 'pending', realHomeScore: null, realAwayScore: null },
            { id: 2, home: 'USA', homeFlag: '🇺🇸', away: 'Senegal', awayFlag: '🇸🇳', date: '12 Jun 2026 - 18:00', status: 'pending', realHomeScore: null, realAwayScore: null },
            { id: 3, home: 'Argentina', homeFlag: '🇦🇷', away: 'España', awayFlag: '🇪🇸', date: '13 Jun 2026 - 16:00', status: 'pending', realHomeScore: null, realAwayScore: null },
            { id: 4, home: 'Canadá', homeFlag: '🇨🇦', away: 'Japón', awayFlag: '🇯🇵', date: '14 Jun 2026 - 12:00', status: 'pending', realHomeScore: null, realAwayScore: null },
            { id: 5, home: 'Brasil', homeFlag: '🇧🇷', away: 'Inglaterra', awayFlag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', date: '15 Jun 2026 - 17:00', status: 'pending', realHomeScore: null, realAwayScore: null },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [userName, setUserName] = useState('');
            const [isLogged, setIsLogged] = useState(false);
            const [activeTab, setActiveTab] = useState('inicio');
            
            const [matches, setMatches] = useState(initialMatches);
            const [predictions, setPredictions] = useState({});
            const [allPredictions, setAllPredictions] = useState([]);
            const [leaderboard, setLeaderboard] = useState([]);
            const [toast, setToast] = useState(null);

            const hasLoadedPreds = useRef(false);

            // 1. Autenticación
            useEffect(() => {
                auth.signInAnonymously().catch(error => console.error("Error Auth:", error));
                const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
                return () => unsubscribe();
            }, []);

            // 2. Sincronización DB
            useEffect(() => {
                if (!user) return;

                const predsRef = db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('predictions');
                const unsubPreds = predsRef.onSnapshot(snap => {
                    const all = [];
                    snap.forEach(doc => all.push({ id: doc.id, ...doc.data() }));
                    setAllPredictions(all);
                });

                const globalRef = db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('state').doc('global');
                const unsubGlobal = globalRef.onSnapshot(doc => {
                    if (doc.exists && doc.data().matches) {
                        setMatches(doc.data().matches);
                    }
                });

                return () => { unsubPreds(); unsubGlobal(); };
            }, [user]);

            // 3. Cargar mis datos
            useEffect(() => {
                if (isLogged && user && allPredictions.length > 0 && !hasLoadedPreds.current) {
                    const myData = allPredictions.find(p => p.id === user.uid);
                    if (myData && myData.preds) setPredictions(myData.preds);
                    hasLoadedPreds.current = true;
                }
            }, [isLogged, user, allPredictions]);

            // 4. Calcular el Ranking
            useEffect(() => {
                const newBoard = allPredictions
                .filter(p => p.userName)
                .map(p => {
                    let pts = 0; let perfs = 0;
                    matches.forEach(m => {
                        if (m.status === 'finished' && p.preds && p.preds[m.id]) {
                            const res = calculatePoints(p.preds[m.id].home, p.preds[m.id].away, m.realHomeScore, m.realAwayScore);
                            pts += res.pts;
                            if (res.perfect) perfs += 1;
                        }
                    });
                    return { id: p.id, name: p.userName, points: pts, perfects: perfs, isMe: p.id === user?.uid };
                })
                .sort((a, b) => b.points - a.points || b.perfects - a.perfects);
                setLeaderboard(newBoard);
            }, [allPredictions, matches, user]);

            const calculatePoints = (predHome, predAway, realHome, realAway) => {
                if (predHome === undefined || predAway === undefined || predHome === '' || predAway === '') return { pts: 0, perfect: false };
                const pH = parseInt(predHome), pA = parseInt(predAway), rH = parseInt(realHome), rA = parseInt(realAway);
                if (pH === rH && pA === rA) return { pts: 3, perfect: true };
                const pDiff = pH - pA, rDiff = rH - rA;
                if ((pDiff > 0 && rDiff > 0) || (pDiff < 0 && rDiff < 0) || (pDiff === 0 && rDiff === 0)) return { pts: 1, perfect: false };
                return { pts: 0, perfect: false };
            };

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            const handleLogin = (e) => {
                e.preventDefault();
                if (userName.trim().length > 2) {
                    setIsLogged(true);
                    if (user) {
                        db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('predictions').doc(user.uid).set({ userName }, { merge: true });
                    }
                }
            };

            const savePredictions = () => {
                const total = Object.keys(predictions).filter(id => predictions[id]?.home !== '' && predictions[id]?.away !== '').length;
                if (total === 0) { showToast('⚠️ No completaste ningún resultado.'); return; }
                if (user) {
                    db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('predictions').doc(user.uid).set({ userName, preds: predictions, updatedAt: Date.now() }, { merge: true });
                    showToast('✅ ¡Guardado en la nube! Todos pueden verlo.');
                }
            };

            const simulateResults = () => {
                const finishedMatches = matches.map(m => ({
                    ...m, status: 'finished', realHomeScore: Math.floor(Math.random() * 4), realAwayScore: Math.floor(Math.random() * 4)
                }));
                if (user) {
                    db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('state').doc('global').set({ matches: finishedMatches }, { merge: true });
                    showToast('⚽ ¡Resultados actualizados para todos!');
                }
            };

            const tournamentStandings = useMemo(() => {
                const standings = {};
                matches.forEach(m => {
                    if (!standings[m.home]) standings[m.home] = { name: m.home, flag: m.homeFlag, pts: 0, pj: 0, gf: 0, gc: 0 };
                    if (!standings[m.away]) standings[m.away] = { name: m.away, flag: m.awayFlag, pts: 0, pj: 0, gf: 0, gc: 0 };
                    if (m.status === 'finished') {
                        const h = parseInt(m.realHomeScore), a = parseInt(m.realAwayScore);
                        standings[m.home].pj++; standings[m.away].pj++;
                        standings[m.home].gf += h; standings[m.home].gc += a;
                        standings[m.away].gf += a; standings[m.away].gc += h;
                        if (h > a) standings[m.home].pts += 3;
                        else if (h < a) standings[m.away].pts += 3;
                        else { standings[m.home].pts++; standings[m.away].pts++; }
                    }
                });
                return Object.values(standings).sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    const diffA = a.gf - a.gc, diffB = b.gf - b.gc;
                    if (diffB !== diffA) return diffB - diffA;
                    return b.gf - a.gf;
                });
            }, [matches]);

            const isSimulated = matches.some(m => m.status === 'finished');

            if (!isLogged) {
                return (
                    <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4 font-sans text-slate-200">
                        <div className="max-w-md w-full bg-slate-900 p-8 rounded-3xl shadow-2xl border border-slate-800 text-center relative overflow-hidden">
                            <div className="bg-lime-500/10 p-4 rounded-full inline-block mb-6">
                                <Trophy className="w-12 h-12 text-lime-400" />
                            </div>
                            <h1 className="text-3xl font-extrabold text-white mb-2">Prode Oficina</h1>
                            <p className="text-slate-400 mb-8">Mundial 2026 🌎 Copa de la Gloria</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <input
                                        type="text"
                                        placeholder="Tu nombre (ej: Nacho - Diseño)"
                                        value={userName}
                                        onChange={(e) => setUserName(e.target.value)}
                                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-white focus:outline-none focus:border-lime-500 text-center text-lg"
                                        autoFocus
                                    />
                                </div>
                                <button
                                    type="submit"
                                    disabled={userName.trim().length < 3 || !user}
                                    className="w-full bg-lime-500 hover:bg-lime-400 disabled:opacity-50 text-slate-950 font-bold text-lg py-4 rounded-xl transition-all flex items-center justify-center gap-2"
                                >
                                    {user ? <React.Fragment>Entrar a la Cancha <ChevronRight className="w-5 h-5" /></React.Fragment> : 'Conectando Servidor...'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="pb-24">
                    {/* Header */}
                    <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-10">
                        <div className="max-w-2xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <Trophy className="w-6 h-6 text-lime-400" />
                                <h1 className="text-xl font-bold text-white">Prode 2026</h1>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="flex items-center gap-1 text-[10px] text-lime-500 font-bold uppercase"><Cloud className="w-3 h-3" /> Online</span>
                                <div className="bg-slate-800 px-3 py-1.5 rounded-full text-sm font-medium text-lime-400 border border-slate-700">{userName}</div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 py-6">
                        {toast && (
                            <div className="fixed top-20 left-1/2 -translate-x-1/2 bg-slate-800 border border-lime-500 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 z-50">
                                <CheckCircle2 className="w-5 h-5 text-lime-400" />
                                <span className="font-medium text-sm">{toast}</span>
                            </div>
                        )}

                        {activeTab === 'inicio' && (
                            <div className="space-y-6">
                                <div><h2 className="text-2xl font-bold text-white mb-1">Mundial 2026</h2><p className="text-slate-400 text-sm mb-6">Fixture y posiciones reales de los equipos.</p></div>
                                <div className="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-950/50 border-b border-slate-800 text-[10px] text-slate-400 uppercase">
                                                <th className="p-3 w-8 text-center">#</th><th className="p-3">Equipo</th><th className="p-3 text-center">PJ</th><th className="p-3 text-center">DIF</th><th className="p-3 text-right font-bold text-white">PTS</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {tournamentStandings.map((team, i) => (
                                                <tr key={team.name} className="hover:bg-slate-800/50">
                                                    <td className="p-3 text-center text-slate-500 font-medium text-sm">{i + 1}</td>
                                                    <td className="p-3 font-medium text-white flex items-center gap-2 text-sm"><span className="text-xl">{team.flag}</span> {team.name}</td>
                                                    <td className="p-3 text-center text-slate-400 text-sm">{team.pj}</td>
                                                    <td className="p-3 text-center text-slate-400 text-sm">{team.gf - team.gc > 0 ? `+${team.gf - team.gc}` : team.gf - team.gc}</td>
                                                    <td className="p-3 text-right font-bold text-white text-base">{team.pts}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'pronosticos' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-end mb-2">
                                    <div><h2 className="text-2xl font-bold text-white">Fase de Grupos</h2><p className="text-slate-400 text-sm">Cargá y compartí con los pibes.</p></div>
                                    {!isSimulated && <button onClick={simulateResults} className="text-xs bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg flex items-center gap-1"><Play className="w-3 h-3 text-lime-400" /> Forzar Cierre</button>}
                                </div>

                                <div className="space-y-4">
                                    {matches.map(match => {
                                        const pred = predictions[match.id] || { home: '', away: '' };
                                        const isFinished = match.status === 'finished';
                                        return (
                                            <div key={match.id} className="bg-slate-900 rounded-2xl p-4 border border-slate-800 relative">
                                                <div className="flex justify-between text-xs text-slate-500 mb-4"><span>{match.date}</span>{isFinished ? <span className="text-lime-500">FINALIZADO</span> : <span className="text-amber-500">PENDIENTE</span>}</div>
                                                <div className="flex justify-between items-center gap-2">
                                                    <div className="flex flex-col items-center flex-1"><span className="text-4xl mb-2">{match.homeFlag}</span><span className="font-semibold text-sm">{match.home}</span></div>
                                                    <div className="flex items-center gap-3">
                                                        <input type="number" min="0" value={pred.home} onChange={(e) => setPredictions(p => ({...p, [match.id]: {...p[match.id], home: e.target.value}}))} disabled={isFinished} className="w-14 h-14 bg-slate-950 border border-slate-700 rounded-xl text-center text-xl font-bold text-white disabled:opacity-50" />
                                                        <span className="text-slate-600 font-bold">-</span>
                                                        <input type="number" min="0" value={pred.away} onChange={(e) => setPredictions(p => ({...p, [match.id]: {...p[match.id], away: e.target.value}}))} disabled={isFinished} className="w-14 h-14 bg-slate-950 border border-slate-700 rounded-xl text-center text-xl font-bold text-white disabled:opacity-50" />
                                                    </div>
                                                    <div className="flex flex-col items-center flex-1"><span className="text-4xl mb-2">{match.awayFlag}</span><span className="font-semibold text-sm">{match.away}</span></div>
                                                </div>
                                                {isFinished && <div className="mt-4 pt-3 border-t border-slate-800 text-center text-sm text-slate-400">Resultado Real: <span className="font-bold text-white">{match.realHomeScore} - {match.realAwayScore}</span></div>}
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={savePredictions} className="w-full bg-lime-500 text-slate-950 font-bold py-4 rounded-xl flex justify-center gap-2"><Cloud className="w-5 h-5" /> Guardar en la Nube</button>
                            </div>
                        )}

                        {activeTab === 'ranking' && (
                            <div className="space-y-4">
                                <div><h2 className="text-2xl font-bold text-white mb-1">Tabla General</h2></div>
                                <div className="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-950/50 border-b border-slate-800 text-xs text-slate-400 uppercase">
                                                <th className="p-4 text-center">#</th><th className="p-4">Jugador</th><th className="p-4 text-right text-lime-500">Pts</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {leaderboard.length === 0 ? <tr><td colSpan="3" className="p-8 text-center text-slate-500">Aún no hay participantes</td></tr> :
                                                leaderboard.map((u, i) => (
                                                    <tr key={u.id} className={u.isMe ? 'bg-slate-800/80 border-l-4 border-l-lime-500' : ''}>
                                                        <td className="p-4 text-center">{i + 1}</td>
                                                        <td className="p-4 font-medium text-white">{u.name} {u.isMe && <span className="text-[10px] bg-lime-500/20 text-lime-400 px-2 py-0.5 rounded-full ml-2">Vos</span>}</td>
                                                        <td className="p-4 text-right font-bold text-lime-400">{u.points}</td>
                                                    </tr>
                                                ))
                                            }
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'reglas' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold text-white mb-4">Reglas</h2>
                                <div className="bg-slate-900 border border-lime-500/30 p-5 rounded-2xl"><h3 className="text-lg font-bold text-white flex items-center gap-2"><CheckCircle2 className="w-5 h-5 text-lime-400"/> 3 Puntos (Pleno)</h3><p className="text-slate-400 text-sm mt-2">Acertás el resultado exacto.</p></div>
                                <div className="bg-slate-900 border border-blue-500/30 p-5 rounded-2xl"><h3 className="text-lg font-bold text-white flex items-center gap-2"><AlertCircle className="w-5 h-5 text-blue-400"/> 1 Punto (Acierto)</h3><p className="text-slate-400 text-sm mt-2">Acertás ganador o empate.</p></div>
                            </div>
                        )}
                    </main>

                    {/* Navbar */}
                    <nav className="fixed bottom-0 w-full bg-slate-900/95 border-t border-slate-800">
                        <div className="max-w-2xl mx-auto flex justify-around p-2">
                            {[{id:'inicio', icon: Globe, label: 'Mundial'}, {id:'pronosticos', icon: Calendar, label: 'Partidos'}, {id:'ranking', icon: Trophy, label: 'Ranking'}, {id:'reglas', icon: Info, label: 'Reglas'}].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1 p-3 rounded-xl w-1/4 ${activeTab === tab.id ? 'text-lime-400 bg-slate-800/50' : 'text-slate-500'}`}>
                                    <tab.icon className="w-6 h-6" /><span className="text-[10px] font-bold uppercase">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
