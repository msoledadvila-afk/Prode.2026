        function App() {
            const [user, setUser] = useState(null);
            const [userName, setUserName] = useState('');
            const [isLogged, setIsLogged] = useState(false);
            const [activeTab, setActiveTab] = useState('inicio');
            const [activeStage, setActiveStage] = useState('grupos'); 
            
            const [matches, setMatches] = useState(initialMatches);
            const [predictions, setPredictions] = useState({});
            const [allPredictions, setAllPredictions] = useState([]);
            const [leaderboard, setLeaderboard] = useState([]);
            const [toast, setToast] = useState(null);

            const hasLoadedPreds = useRef(false);

            // 1. Autenticación
            useEffect(() => {
                auth.signInAnonymously().catch(error => console.error("Error Auth:", error));
                const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
                return () => unsubscribe();
            }, []);

            // 2. Sincronización DB
            useEffect(() => {
                if (!user) return;

                const predsRef = db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('predictions');
                const unsubPreds = predsRef.onSnapshot(snap => {
                    const all = [];
                    snap.forEach(doc => all.push({ id: doc.id, ...doc.data() }));
                    setAllPredictions(all);
                });

                const globalRef = db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('state').doc('global');
                const unsubGlobal = globalRef.onSnapshot(doc => {
                    if (doc.exists && doc.data().matches) {
                        setMatches(doc.data().matches);
                    }
                });

                return () => { unsubPreds(); unsubGlobal(); };
            }, [user]);

            // 3. Cargar mis datos
            useEffect(() => {
                if (isLogged && user && allPredictions.length > 0 && !hasLoadedPreds.current) {
                    const myData = allPredictions.find(p => p.id === user.uid);
                    if (myData && myData.preds) setPredictions(myData.preds);
                    hasLoadedPreds.current = true;
                }
            }, [isLogged, user, allPredictions]);

            // 4. Calcular el Ranking
            useEffect(() => {
                const newBoard = allPredictions
                .filter(p => p.userName)
                .map(p => {
                    let pts = 0; let perfs = 0;
                    matches.forEach(m => {
                        if (m.status === 'finished' && p.preds && p.preds[m.id]) {
                            const res = calculatePoints(p.preds[m.id].home, p.preds[m.id].away, m.realHomeScore, m.realAwayScore);
                            pts += res.pts;
                            if (res.perfect) perfs += 1;
                        }
                    });
                    return { id: p.id, name: p.userName, points: pts, perfects: perfs, isMe: p.id === user?.uid };
                })
                .sort((a, b) => b.points - a.points || b.perfects - a.perfects);
                setLeaderboard(newBoard);
            }, [allPredictions, matches, user]);

            const calculatePoints = (predHome, predAway, realHome, realAway) => {
                if (predHome === undefined || predAway === undefined || predHome === '' || predAway === '') return { pts: 0, perfect: false };
                const pH = parseInt(predHome), pA = parseInt(predAway), rH = parseInt(realHome), rA = parseInt(realAway);
                if (pH === rH && pA === rA) return { pts: 3, perfect: true };
                const pDiff = pH - pA, rDiff = rH - rA;
                if ((pDiff > 0 && rDiff > 0) || (pDiff < 0 && rDiff < 0) || (pDiff === 0 && rDiff === 0)) return { pts: 1, perfect: false };
                return { pts: 0, perfect: false };
            };

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

                    setIsLogged(true);
                    if (user) {

                    }
                }
            };

                    db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('predictions').doc(user.uid).set({ userName, preds: predictions, updatedAt: Date.now() }, { merge: true });
                    showToast('✅ ¡Pronósticos guardados en la nube!');

                    ...m, status: 'finished', realHomeScore: Math.floor(Math.random() * 4), realAwayScore: Math.floor(Math.random() * 4)

                    showToast('⚽ ¡Resultados actualizados para todos!');

            };

            // Calcular posiciones reales del torneo agrupado
            const tournamentStandings = useMemo(() => {

                    teams.forEach(team => {
                        standings[team.name] = { name: team.name, flag: team.flag, group: groupName, pts: 0, pj: 0, gf: 0, gc: 0 };
                    });
                });

                matches.forEach(m => {
                    if (m.stage !== 'grupos' || !standings[m.home] || !standings[m.away]) return;
                    
                    if (m.status === 'finished') {
                        const h = parseInt(m.realHomeScore), a = parseInt(m.realAwayScore);
                        standings[m.home].pj++; standings[m.away].pj++;
                        standings[m.home].gf += h; standings[m.home].gc += a;
                        standings[m.away].gf += a; standings[m.away].gc += h;
                        if (h > a) standings[m.home].pts += 3;
                        else if (h < a) standings[m.away].pts += 3;
                        else { standings[m.home].pts++; standings[m.away].pts++; }
                    }
                });

                const groupedStandings = {};
                Object.keys(TOURNAMENT_GROUPS).forEach(g => {
                    groupedStandings[g] = Object.values(standings)
                        .filter(t => t.group === g)
                        .sort((a, b) => {
                            if (b.pts !== a.pts) return b.pts - a.pts;
                            const diffA = a.gf - a.gc, diffB = b.gf - b.gc;
                            if (diffB !== diffA) return diffB - diffA;
                            return b.gf - a.gf;
                        });
                });
                return groupedStandings;
            }, [matches]);

                                        <p className="text-sky-600 font-medium text-sm">Cargá tus resultados por fase.</p>
                                    </div>
                                    {!isSimulated && <button onClick={simulateResults} className="text-xs bg-white hover:bg-sky-50 border border-sky-300 text-sky-700 font-bold px-3 py-2 rounded-lg flex items-center gap-1 shadow-sm"><Play className="w-3 h-3 text-sky-500" /> Simular</button>}
                                </div>

                                {/* Submenú de Fases */}
                                <div className="flex overflow-x-auto pb-2 gap-2 hide-scrollbar">
                                    {stagesList.map(stage => (
                                        <button 
                                            key={stage.id} 
                                            onClick={() => setActiveStage(stage.id)}
                                            className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm ${activeStage === stage.id ? 'bg-sky-600 text-white shadow-md' : 'bg-white text-sky-700 border border-sky-200 hover:bg-sky-50'}`}
                                        >
                                            {stage.label}
                                        </button>
                                    ))}
                                </div>

                                <div className="space-y-4">
                                    {matchesToShow.map(match => {
                                        const pred = predictions[match.id] || { home: '', away: '' };
                                        const isFinished = match.status === 'finished';
                                        
                                        let resultBadge = null;
                                        if (isFinished && pred.home !== '' && pred.away !== '') {
                                            const result = calculatePoints(pred.home, pred.away, match.realHomeScore, match.realAwayScore);
                                            if (result.perfect) resultBadge = <span className="text-[10px] font-black text-white bg-green-500 px-2 py-0.5 rounded-md shadow-sm ml-2">PLENO +3</span>;
                                            else if (result.pts === 1) resultBadge = <span className="text-[10px] font-black text-white bg-blue-500 px-2 py-0.5 rounded-md shadow-sm ml-2">ACIERTO +1</span>;
                                            else resultBadge = <span className="text-[10px] font-black text-white bg-red-400 px-2 py-0.5 rounded-md shadow-sm ml-2">NADA 0</span>;
                                        }

                                        return (
                                            <div key={match.id} className="bg-white rounded-2xl p-4 border border-sky-200 shadow-sm relative">
                                                <div className="flex justify-between items-center text-xs font-bold text-sky-600 mb-4 uppercase tracking-wider">
                                                    <span>{match.date}</span>
                                                    {isFinished ? <span className="text-slate-500 flex items-center">FINAL {resultBadge}</span> : <span className="text-yellow-600">PENDIENTE</span>}
                                                </div>
                                                
                                                <div className="flex justify-between items-center gap-2">
                                                    <div className="flex flex-col items-center flex-1 w-1/3 text-center">
                                                        <span className="text-4xl mb-2 drop-shadow-sm">{match.homeFlag}</span>
                                                        <span className="font-bold text-slate-700 text-sm">{match.home}</span>
                                                    </div>
                                                    
                                                    <div className="flex items-center gap-2">
                                                        <input type="number" min="0" value={pred.home} onChange={(e) => setPredictions(p => ({...p, [match.id]: {...p[match.id], home: e.target.value}}))} disabled={isFinished} className="w-12 h-14 bg-sky-50 border-2 border-sky-200 rounded-xl text-center text-xl font-black text-sky-900 focus:border-sky-500 focus:ring-2 focus:ring-sky-200 disabled:opacity-50 disabled:bg-slate-100 shadow-inner" />
                                                        <span className="text-sky-300 font-black">-</span>
                                                        <input type="number" min="0" value={pred.away} onChange={(e) => setPredictions(p => ({...p, [match.id]: {...p[match.id], away: e.target.value}}))} disabled={isFinished} className="w-12 h-14 bg-sky-50 border-2 border-sky-200 rounded-xl text-center text-xl font-black text-sky-900 focus:border-sky-500 focus:ring-2 focus:ring-sky-200 disabled:opacity-50 disabled:bg-slate-100 shadow-inner" />
                                                    </div>
                                                    
                                                    <div className="flex flex-col items-center flex-1 w-1/3 text-center">
                                                        <span className="text-4xl mb-2 drop-shadow-sm">{match.awayFlag}</span>
                                                        <span className="font-bold text-slate-700 text-sm">{match.away}</span>
                                                    </div>
                                                </div>
                                                
                                                {isFinished && <div className="mt-4 pt-3 border-t border-sky-100 text-center text-sm font-medium text-slate-500">Resultado Oficial: <span className="font-black text-sky-700">{match.realHomeScore} - {match.realAwayScore}</span></div>}
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={savePredictions} className="w-full bg-sky-500 hover:bg-sky-600 text-white font-black py-4 rounded-xl flex justify-center items-center gap-2 shadow-md hover:shadow-lg transition-all sticky bottom-24"><Cloud className="w-5 h-5" /> Guardar Pronósticos</button>
                            </div>
                        )}

                        {/* Pestaña: Ranking */}
                        {activeTab === 'ranking' && (
                            <div className="space-y-4">
                                <div><h2 className="text-2xl font-black text-sky-900 mb-1">Tabla de la Oficina</h2></div>
                                <div className="bg-white rounded-2xl border border-sky-200 shadow-sm overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-sky-100/50 border-b border-sky-200 text-xs text-sky-700 uppercase font-bold">
                                                <th className="p-4 text-center">#</th>
                                                <th className="p-4">Jugador</th>
                                                <th className="p-4 text-right text-sky-900">Pts</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-sky-100">
                                            {leaderboard.length === 0 ? <tr><td colSpan="3" className="p-8 text-center text-slate-500 font-medium">Aún no hay participantes.<br/>¡Cargá los tuyos!</td></tr> :
                                                leaderboard.map((u, i) => (
                                                    <tr key={u.id} className={`hover:bg-sky-50 transition-colors ${u.isMe ? 'bg-sky-100/50 border-l-4 border-l-sky-500' : ''}`}>
                                                        <td className="p-4 text-center font-bold text-slate-500">
                                                            {i === 0 ? '🏆' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}
                                                        </td>
                                                        <td className="p-4 font-bold text-slate-700">
                                                            {u.name} {u.isMe && <span className="text-[10px] font-black bg-sky-500 text-white px-2 py-0.5 rounded-full ml-2 shadow-sm">VOS</span>}
                                                        </td>
                                                        <td className="p-4 text-right font-black text-sky-600 text-lg">{u.points}</td>
                                                    </tr>
                                                ))
                                            }
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* Pestaña: Reglas */}
                        {activeTab === 'reglas' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-black text-sky-900 mb-4">Reglas del Prode</h2>
                                <div className="bg-white border-2 border-green-200 p-5 rounded-2xl shadow-sm relative overflow-hidden">
                                    <div className="absolute top-0 right-0 bg-green-500 text-white font-black px-3 py-1 rounded-bl-lg text-xs">3 PUNTOS</div>
                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><CheckCircle2 className="w-5 h-5 text-green-500"/> El Pleno</h3>
                                    <p className="text-slate-600 font-medium text-sm mt-2">Acertás el resultado exacto (ej: ponés 2-0 y sale 2-0).</p>
                                </div>
                                <div className="bg-white border-2 border-blue-200 p-5 rounded-2xl shadow-sm relative overflow-hidden">
                                    <div className="absolute top-0 right-0 bg-blue-500 text-white font-black px-3 py-1 rounded-bl-lg text-xs">1 PUNTO</div>
                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><AlertCircle className="w-5 h-5 text-blue-500"/> El Acierto</h3>
                                    <p className="text-slate-600 font-medium text-sm mt-2">Acertás al ganador o si hay empate (ej: ponés 1-0 y sale 3-0).</p>
                                </div>
                                <div className="bg-sky-100 border border-sky-200 p-5 rounded-2xl shadow-sm">
                                    <h3 className="font-bold text-sky-900 mb-2 text-sm uppercase">Detalles del Formato (48 equipos)</h3>
                                    <ul className="text-sky-800 text-sm space-y-2 list-disc list-inside font-medium">
                                        <li>Los puntos en eliminatorias (16avos en adelante) se cuentan por el resultado de los 90 minutos reglamentarios.</li>
                                        <li>El botón de "Guardar" guarda los cambios de <b>todas las fases juntas</b>.</li>
                                    </ul>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navbar Inferior */}
                    <nav className="fixed bottom-0 w-full bg-white border-t border-sky-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe">
                        <div className="max-w-2xl mx-auto flex justify-around p-2">
                            {[{id:'inicio', icon: Globe, label: 'Mundial'}, {id:'pronosticos', icon: Calendar, label: 'Partidos'}, {id:'ranking', icon: Trophy, label: 'Ranking'}, {id:'reglas', icon: Info, label: 'Reglas'}].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1 p-3 rounded-xl w-1/4 transition-colors ${activeTab === tab.id ? 'text-sky-600 bg-sky-50' : 'text-slate-400 hover:text-sky-500'}`}>
                                    <tab.icon className="w-6 h-6" /><span className="text-[10px] font-black uppercase tracking-wider">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <style>
        /* Ocultar barra de scroll en el submenú horizontal */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
